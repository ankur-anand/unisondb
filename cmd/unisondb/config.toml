## Port of the http server
http_port = 4000
pprof_enable = true

[grpc_config]
port = 4001
# SSL/TLS certificate paths for gRPC server
cert_path = "../../certs/server.crt"
key_path = "../../certs/server.key"
ca_path = "../../certs/ca.crt"
allow_insecure = true

# StorageConfig stores all tunable parameters.
[storage_config]
base_dir = "/tmp/unisondb/server"   # Base directory for storage
namespaces = ["ad-campaign"]
bytes_per_sync = "1MB"
segment_size = "16MB"
arena_size = "4MB"

[write_notify_config]
enabled = true
max_delay = "20ms"

[storage_config.wal_cleanup_config]
interval = "5m"
enabled = false
max_age = "5h"
min_segments = 50
max_segments = 1000

[pprof_config]
enabled = true
port = 6070

[log_config]
log_level = "info"
disable_timestamp = false

## this is for grpc logging only
[log_config.min_level_percents]
debug = 100.0
info  = 100.0
warn  = 100.0
error = 100.0

[fuzz_config]
ops_per_namespace = 500
workers_per_namespace = 20
local_relayer_count = 0
startup_delay = "2m"
